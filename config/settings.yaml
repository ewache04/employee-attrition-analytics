paths:
  bronze: data/bronze
  silver: data/silver
  gold: data/gold
  exports: data/exports

data:
  source_filename: WA_Fn-UseC_-HR-Employee-Attrition.csv
  target_column: Attrition
  constant_columns:
    - EmployeeCount
    - Over18
    - StandardHours
  ordinal_mappings:
    Education:
      1: Below College
      2: College
      3: Bachelor
      4: Master
      5: Doctor
    EnvironmentSatisfaction:
      1: Low
      2: Medium
      3: High
      4: Very High
    JobInvolvement:
      1: Low
      2: Medium
      3: High
      4: Very High
    JobSatisfaction:
      1: Low
      2: Medium
      3: High
      4: Very High
    PerformanceRating:
      1: Low
      2: Good
      3: Excellent
      4: Outstanding
    RelationshipSatisfaction:
      1: Low
      2: Medium
      3: High
      4: Very High
    WorkLifeBalance:
      1: Bad
      2: Good
      3: Better
      4: Best

random_seed: 42